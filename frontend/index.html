<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <!-- Favicons -->
        <link
            rel="icon"
            type="image/png"
            sizes="192x192"
            href="/icons/icon-192.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/icons/icon-512.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="192x192"
            href="/icons/icon-192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="512x512"
            href="/icons/icon-512.png"
        />

        <!-- Viewport -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />

        <!-- Primary Meta Tags -->
        <title>iOS Screen Time Screenshot Processing</title>
        <meta
            name="title"
            content="iOS Screen Time Screenshot Processing"
        />
        <meta
            name="description"
            content="Extract and analyze battery and screen time usage data from iOS screenshots using AI-powered OCR. Works offline with WebAssembly processing."
        />

        <!-- Theme Color -->
        <meta name="theme-color" content="#3b82f6" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta
            name="apple-mobile-web-app-title"
            content="iOS Screen Time"
        />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta
            property="og:title"
            content="iOS Screen Time Screenshot Processing"
        />
        <meta
            property="og:description"
            content="Extract and analyze battery and screen time usage data from iOS screenshots using AI-powered OCR. Works offline with WebAssembly processing."
        />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="iOS Screen Time Screenshot Processing"
        />
        <meta
            name="twitter:description"
            content="Extract and analyze battery and screen time usage data from iOS screenshots using AI-powered OCR. Works offline with WebAssembly processing."
        />
        <!-- Decode GitHub Pages SPA redirect (see public/404.html).
             Runs before React so history.replaceState restores the real path. -->
        <script>
            (function (l) {
                if (l.search[1] === "/") {
                    var decoded = l.search
                        .slice(1)
                        .split("&")
                        .map(function (s) { return s.replace(/~and~/g, "&"); })
                        .join("?");
                    window.history.replaceState(
                        null,
                        null,
                        l.pathname.slice(0, -1) + decoded + l.hash
                    );
                }
            })(window.location);
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script src="./config.js"></script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
