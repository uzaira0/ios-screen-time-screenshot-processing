# cargo-deny workspace configuration
# Run: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Pre-existing advisories from transitive dependencies (Tauri, pyo3, reqwest, etc.)
# Fix each by upgrading the affected crate when a compatible version is available.
ignore = [
    # pyo3: PyString::from_object buffer overflow — fix: upgrade pyo3
    { id = "RUSTSEC-2024-0413" },
    # rustls-webpki: CRL matching, name constraints, wildcard — fix: upgrade rustls-webpki
    { id = "RUSTSEC-2024-0416" },
    { id = "RUSTSEC-2026-0105" },
    { id = "RUSTSEC-2025-0057" },
    { id = "RUSTSEC-2024-0412" },
    { id = "RUSTSEC-2024-0418" },
    { id = "RUSTSEC-2024-0411" },
    { id = "RUSTSEC-2024-0417" },
    { id = "RUSTSEC-2024-0414" },
    { id = "RUSTSEC-2024-0415" },
    # tar-rs: PAX size headers / symlink chmod — fix: upgrade tar
    { id = "RUSTSEC-2024-0370" },
    { id = "RUSTSEC-2024-0419" },
    { id = "RUSTSEC-2024-0420" },
    { id = "RUSTSEC-2024-0436" },
    # Unmaintained crates pulled in by Tauri/GTK3 stack
    { id = "RUSTSEC-2025-0020" },
    { id = "RUSTSEC-2025-0075" },
    { id = "RUSTSEC-2025-0080" },
    { id = "RUSTSEC-2025-0081" },
    { id = "RUSTSEC-2025-0098" },
    { id = "RUSTSEC-2025-0100" },
    { id = "RUSTSEC-2026-0049" },
    { id = "RUSTSEC-2026-0067" },
    { id = "RUSTSEC-2026-0068" },
    { id = "RUSTSEC-2026-0098" },
    { id = "RUSTSEC-2026-0099" },
    { id = "RUSTSEC-2026-0104" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    # MPL-2.0: option-ext (dirs-sys → dirs → tauri), selectors (kuchikiki → tauri-utils)
    "MPL-2.0",
    # NCSA: libfuzzer-sys (rav1e → ravif → image); OSI+FSF approved, permissive
    "NCSA",
    # CDLA-Permissive-2.0: webpki-root-certs (rustls-platform-verifier → reqwest → tauri)
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# ring has a non-standard SPDX expression — clarify hash must match.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # Known soundness issue
    { name = "marvin-hack" },
    # Avoid openssl-sys — rustls is used instead
    { name = "openssl-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
