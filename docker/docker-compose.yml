# =============================================================================
# Docker Compose - iOS Screen Time Screenshot Processing
# =============================================================================
# Production stack with Traefik integration
#
# Prerequisites:
#   1. Start Traefik first: cd infrastructure/traefik && docker-compose up -d
#   2. Copy .env.example to .env and configure
#
# Usage:
#   docker-compose -f docker/docker-compose.yml up -d
#
# Access (via Traefik):
#   - http://labserver/ios-screen-time-screenshot-processing         → Frontend
#   - http://labserver/ios-screen-time-screenshot-processing/api/v1  → Backend API
# =============================================================================

name: ios-screen-time

services:
  # ---------------------------------------------------------------------------
  # Database Services
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ios-screen-time-screenshot-processing-postgres
    environment:
      POSTGRES_USER: ios_screen_time_screenshot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ios_screen_time_screenshot_processing
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ios_screen_time_screenshot -d ios_screen_time_screenshot_processing"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ios-screen-time-screenshot-processing-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-}
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.dev
    container_name: ios-screen-time-screenshot-processing-backend
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://ios_screen_time_screenshot:${POSTGRES_PASSWORD}@postgres:5432/ios_screen_time_screenshot_processing
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      UPLOAD_API_KEY: ${UPLOAD_API_KEY:?UPLOAD_API_KEY must be set}
      ADMIN_USERNAMES: admin
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      RATE_LIMIT_DEFAULT: 100/minute
      DEBUG: "false"
      USE_FRACTIONAL_HOURLY_VALUES: "false"
    volumes:
      - ../uploads:/app/uploads
      - ../output:/app/output
      - ${SCREENSHOT_SOURCE_PATH:-../screenshots}:/app/screenshots:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - traefik-apps
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-apps"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-api.rule=PathPrefix(`/ios-screen-time-screenshot-processing/api`)"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-api.entrypoints=web"
      - "traefik.http.services.ios-screen-time-screenshot-processing-api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ios-screen-time-screenshot-processing-api-strip.stripprefix.prefixes=/ios-screen-time-screenshot-processing"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-api.middlewares=ios-screen-time-screenshot-processing-api-strip"

  celery-worker:
    image: ${BACKEND_IMAGE:-}
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.dev
    container_name: ios-screen-time-screenshot-processing-celery
    command: celery -A src.screenshot_processor.web.celery_app worker --loglevel=info --concurrency=2
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://ios_screen_time_screenshot:${POSTGRES_PASSWORD}@postgres:5432/ios_screen_time_screenshot_processing
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      USE_FRACTIONAL_HOURLY_VALUES: "false"
    volumes:
      - ../uploads:/app/uploads
      - ../output:/app/output
      - ${SCREENSHOT_SOURCE_PATH:-../screenshots}:/app/screenshots:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  frontend:
    image: ${FRONTEND_IMAGE:-}
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        APP_PATH_PREFIX: /ios-screen-time-screenshot-processing
    container_name: ios-screen-time-screenshot-processing-frontend
    environment:
      BASE_PATH: /ios-screen-time-screenshot-processing
      API_BASE_URL: /ios-screen-time-screenshot-processing/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - traefik-apps
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-fe.rule=PathPrefix(`/ios-screen-time-screenshot-processing`)"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-fe.entrypoints=web"
      - "traefik.http.services.ios-screen-time-screenshot-processing-fe.loadbalancer.server.port=80"
      - "traefik.http.middlewares.ios-screen-time-screenshot-processing-fe-strip.stripprefix.prefixes=/ios-screen-time-screenshot-processing"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-fe.middlewares=ios-screen-time-screenshot-processing-fe-strip"
      - "traefik.http.routers.ios-screen-time-screenshot-processing-fe.priority=1"

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    name: ios-screen-time-screenshot-processing-internal
  traefik-apps:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: ios_screen_time_screenshot_processing_postgres_data
  redis-data:
    name: ios_screen_time_screenshot_processing_redis_data
