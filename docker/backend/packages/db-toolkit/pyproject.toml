[project]
name = "db-toolkit"
version = "0.1.0"
description = "Database utilities for FastAPI with SQLAlchemy async"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Research Team" }]
keywords = ["fastapi", "sqlalchemy", "database", "async"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: FastAPI",
    "Typing :: Typed",
]
dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
postgres = [
    "asyncpg>=0.28.0",
]
sqlite = [
    "aiosqlite>=0.19.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
]
all = [
    "db-toolkit[postgres,sqlite,dev]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db_toolkit"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
