[project]
name = "ipad-screenshot-cropper"
version = "1.0.0"
description = "Geometric cropping and device detection for iPad screenshots"
requires-python = ">=3.11"
dependencies = [
    "opencv-python>=4.5.0",
    "Pillow>=9.0.0",
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
web = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "httpx>=0.27.0",
    "python-multipart>=0.0.9",
]
phi = ["phi-detector-remover"]
full = ["ipad-screenshot-cropper[web,phi]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ipad_screenshot_cropper"]
