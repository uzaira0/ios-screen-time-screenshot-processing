version: "3.9"

services:
  paddleocr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paddleocr-server
    ports:
      - "8081:8081"
    volumes:
      - ./models:/root/.paddleocr
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
