# Nginx configuration for WASM-only Screenshot Processor
# Simple static file serving with SPA routing support

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               application/wasm text/x-component application/vnd.ms-fontobject
               application/x-font-ttf font/opentype;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Content Security Policy. 'wasm-unsafe-eval' is the narrow directive
        # that permits WebAssembly compilation only — broader 'unsafe-eval'
        # also allows arbitrary string-to-code conversion which we don't need.
        # No external CDNs in connect-src: all OCR / WASM assets are served
        # from this origin.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

        # Cross-Origin headers for SharedArrayBuffer (required for some WASM features)
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # =================================================================
        # PWA Support
        # =================================================================

        # Manifest file
        location = /manifest.webmanifest {
            add_header Content-Type application/manifest+json;
            add_header Cache-Control "public, max-age=0, must-revalidate";
            try_files $uri =404;
        }

        # Service Worker - must not be cached
        location = /sw.js {
            add_header Cache-Control "public, max-age=0, must-revalidate";
            add_header Service-Worker-Allowed "/";
            try_files $uri =404;
        }

        # Workbox files
        location ~* ^/workbox-.+\.js$ {
            add_header Cache-Control "public, max-age=0, must-revalidate";
            try_files $uri =404;
        }

        # =================================================================
        # Static Assets
        # =================================================================

        # Hashed assets - cache aggressively (1 year)
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Icons
        location /icons/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # WASM files - special handling
        location ~* \.wasm$ {
            add_header Content-Type application/wasm;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # =================================================================
        # SPA Routing
        # =================================================================

        # All other routes serve index.html (SPA fallback)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # =================================================================
        # Error Handling
        # =================================================================

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
