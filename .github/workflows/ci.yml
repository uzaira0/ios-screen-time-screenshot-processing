name: CI

# CI exists ONLY for checks that cannot run locally or that gate deployments.
# All testing, linting, and type checking runs locally via scripts/test-all.sh.
#
# What's here:
#   - Nothing. The tauri-build.yml handles releases.
#
# If you need CI for multi-OS matrix builds or cloud-only services, add jobs here.
# Otherwise, run scripts/test-all.sh locally before pushing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Placeholder — all real checks run locally via scripts/test-all.sh
  # The tauri-build.yml workflow handles release builds on tag push.
  check:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: echo "All testing runs locally. See scripts/test-all.sh"
